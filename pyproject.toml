[tool.ruff]
line-length = 88
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "node_modules",
    "dist",
    "build",
    "*.egg-info",
    "frontend",
    "model/notebooks",
    ".agents",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # do not perform function calls in default args
    "B905",  # zip() without explicit strict
]

[tool.ruff.lint.per-file-ignores]
"backend/app/main.py" = ["E402"]
"backend/models/models.py" = ["E402"]
"model/training/train.py" = ["E402"]
"model/training/recommendation.py" = ["E402"]
"model/preprocessing/feature_engineering/build_features.py" = ["E701"]
"model/preprocessing/cuda/cuda_eda_acceleration.py" = ["W291", "W293"]

[tool.ruff.lint.isort]
known-first-party = ["model", "deployment"]

[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | node_modules
  | dist
  | build
  | frontend
  | \.agents
)/
'''

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = [
    "frontend/",
    "model/notebooks/",
    ".venv/",
]

[tool.pytest.ini_options]
testpaths = ["backend/tests", "model/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -q"

[tool.coverage.run]
source = ["backend", "model"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*.egg-info/*",
    "frontend/*",
    "model/notebooks/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "pass",
]
