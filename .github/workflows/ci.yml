name: CI — Build & Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Python Backend & ML ────────────────────────────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install -r requirements/ml.txt
          pip install -r requirements/api.txt
          pip install -r requirements/dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=deployment/backend --cov=model \
            --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_frontend.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-${{ matrix.python-version }}
          fail_ci_if_error: false

  # ─── Frontend Node.js ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: deployment/frontend/package-lock.json

      - name: Install dependencies
        working-directory: deployment/frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: deployment/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: deployment/frontend
        run: npm run build
        env:
          NODE_ENV: production

  # ─── Docker Build Validation ──────────────────────────────────────────────────
  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: deployment/backend
          push: false
          tags: netflix-analytics-backend:ci

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: deployment/frontend
          push: false
          tags: netflix-analytics-frontend:ci
