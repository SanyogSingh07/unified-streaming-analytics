name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies & run tests
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/ml.txt
          pip install -r requirements/api.txt
          pip install -r requirements/dev.txt
          pytest backend/tests/ model/tests/ -v --tb=short

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Extract section for this version from CHANGELOG.md
          python - <<'EOF'
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          version = "${{ steps.version.outputs.VERSION }}"
          # Find the section for this version
          pattern = rf'## \[{re.escape(version.lstrip("v"))}\].*?\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open('release_notes.md', 'w') as f:
              f.write(notes)
          EOF

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create release archive
        run: |
          tar -czf netflix-analytics-${{ steps.version.outputs.VERSION }}.tar.gz \
            --exclude=node_modules \
            --exclude=.venv \
            --exclude=__pycache__ \
            --exclude='*.pyc' \
            --exclude='.git' \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Netflix AI Analytics ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            netflix-analytics-${{ steps.version.outputs.VERSION }}.tar.gz
