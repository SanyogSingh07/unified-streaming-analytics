version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./datasets:/datasets
      - ./model:/model
    environment:
      - ENV=dev

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
