version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netflix-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ../model/analytics.db:/app/analytics.db  # Mount the generated DB
      - ../model/evaluation/ml_results.json:/app/ml_results.json # Mount ML results
    environment:
      - DATABASE_URL=sqlite:///analytics.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netflix-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
